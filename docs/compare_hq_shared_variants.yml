name: compare_hq_shared_variants

candidates:
  - name: baseline_stdj
    agent_ref: TestModel_StandardJ035/StandardJ035_PTFE:hq_shared_8538897
  - name: thirdparty_stdj
    agent_ref: TestModel_StandardJ035/StandardJ035_PTFE_ThirdParty:hq_shared_8538897
  - name: tip_wide
    agent_ref: TestModel_StandardJ035/StandardJ035_PTFE_TipWide:hq_shared_8538897
  - name: tip_tight
    agent_ref: TestModel_StandardJ035/StandardJ035_PTFE_TipTight:hq_shared_8538897

n_trials: 5
base_seed: 123
max_episode_steps: 1000
policy_device: cuda
use_non_mp_sim: true
stochastic_eval: false
visualize: false
visualize_trials_per_agent: 1

force_extraction:
  mode: passive
  required: false
  contact_epsilon: 1.0e-7

output_root: results/eval_runs

anatomy:
  type: aortic_arch
  arch_type: I
  seed: 30
  target_mode: branch_end
  target_branches: ["lcca"]
  target_threshold_mm: 5.0
