name: compare_wire_registry_attached_best

candidates:
  - name: steve_default_standard_j
    agent_ref: steve_default/standard_j:archvar_original_best
  - name: amplatz_super_stiff_standard_j
    agent_ref: amplatz_super_stiff/standard_j:archvar_amplatz_superstiff_best
  - name: universal_ii_standard_j
    agent_ref: universal_ii/standard_j:archvar_universalII_best

n_trials: 1
base_seed: 123
max_episode_steps: 1000
policy_device: cpu
use_non_mp_sim: true
stochastic_eval: false
visualize: false
visualize_trials_per_agent: 1

force_extraction:
  mode: passive
  required: false
  contact_epsilon: 1.0e-7

output_root: results/eval_runs

anatomy:
  type: aortic_arch
  arch_type: I
  seed: 30
  target_mode: branch_end
  target_branches: ["lcca"]
  target_threshold_mm: 5.0
